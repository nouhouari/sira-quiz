# .github/workflows/android-release.yml
# Quiz Sîra — Android release / beta CI
#
# Triggers:
#   • Manual: Actions → "Run workflow"
#   • Automatic: any tag matching v* (e.g. v1.0.0)
#
# Required GitHub Secrets — add these in Settings → Secrets → Actions:
# ┌────────────────────────────────────┬──────────────────────────────────────────────────────┐
# │ Secret name                        │ How to obtain                                        │
# ├────────────────────────────────────┼──────────────────────────────────────────────────────┤
# │ PLAY_SERVICE_ACCOUNT_JSON_BASE64   │ base64 < android/fastlane/play-store-service-account │
# │                                    │   .json  — from Google Play Console → Setup →         │
# │                                    │   API access → create service account                │
# ├────────────────────────────────────┼──────────────────────────────────────────────────────┤
# │ ANDROID_KEYSTORE_BASE64            │ base64 < sira_quiz.keystore                          │
# │                                    │   — your release keystore file                       │
# ├────────────────────────────────────┼──────────────────────────────────────────────────────┤
# │ ANDROID_KEY_ALIAS                  │ Key alias used when generating the keystore          │
# │                                    │   (default in RELEASE.md: sira_quiz)                 │
# ├────────────────────────────────────┼──────────────────────────────────────────────────────┤
# │ ANDROID_STORE_PASSWORD             │ Keystore store password                              │
# ├────────────────────────────────────┼──────────────────────────────────────────────────────┤
# │ ANDROID_KEY_PASSWORD               │ Key password (often same as store password)          │
# └────────────────────────────────────┴──────────────────────────────────────────────────────┘

name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  android-beta:
    name: Build AAB & upload to Play internal track
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 (required by Gradle) ─────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Flutter (FVM stable) ──────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 4. Ruby + Bundler (android/ Gemfile) ─────────────────────────────────
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: android

      # ── 5. Decode Play Store service account JSON ────────────────────────────
      - name: Decode Play Store service account
        env:
          PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          echo "$PLAY_SERVICE_ACCOUNT_JSON_BASE64" | base64 --decode \
            > android/fastlane/play-store-service-account.json

      # ── 6. Decode keystore + write key.properties ────────────────────────────
      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/sira_quiz.keystore

      - name: Write key.properties
        env:
          ANDROID_KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=${{ github.workspace }}/android/sira_quiz.keystore
          storePassword=${ANDROID_STORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

      # ── 7. Flutter dependencies & code generation ────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate l10n
        run: flutter gen-l10n

      # ── 8. Run fastlane beta lane ─────────────────────────────────────────────
      - name: Fastlane beta
        working-directory: android
        env:
          FLUTTER_BIN: flutter
          PLAY_JSON_KEY_FILE: fastlane/play-store-service-account.json
        run: bundle exec fastlane android beta

      # ── 9. Upload AAB as workflow artifact (for traceability) ─────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
